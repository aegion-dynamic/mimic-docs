name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 **Welcome to MIMIC!** Thanks for opening your first pull request, @${{ github.actor }}!

            We're excited to have you contribute to the simulation ecosystem. Here's what happens next:

            1. ⏳ A maintainer will review your PR within **72 hours**.
            2. 📋 Make sure you've filled out the [PR template](https://github.com/aegion-dynamic/mimic-docs/blob/main/.github/PULL_REQUEST_TEMPLATE.md) completely.
            3. 📖 If you haven't already, check out [CONTRIBUTING.md](https://github.com/aegion-dynamic/mimic-docs/blob/main/CONTRIBUTING.md) for coding conventions and commit message guidelines.

            Your contribution will be featured on the [Mimic landing page](https://mimic.aegiondynamic.com) automatically once merged! 🚀

            — *Aegion Dynamic // MIMIC Automation*
          issue-message: |
            👋 **Welcome to MIMIC!** Thanks for opening your first issue, @${{ github.actor }}!

            A maintainer will review this within **48 hours**. In the meantime:

            - 📖 Check the [documentation](https://mimic.aegiondynamic.com/docs/) — your answer might already be there.
            - 💬 For general questions, consider using [Discussions](https://github.com/aegion-dynamic/mimic-docs/discussions) instead.
            - 🤝 Want to fix this yourself? Comment "I'd like to take this" and we'll assign it to you!

            — *Aegion Dynamic // MIMIC Automation*
