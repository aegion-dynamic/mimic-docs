name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push a branch
      pull-requests: write  # To create a PR from that branch
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          
      - name: Install mdbook
        run: |
          mkdir -p bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.14.1/mdbook-v0.14.1-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C bin
          echo "$PWD/bin" >> $GITHUB_PATH
          
      - name: Build mdbook
        run: |
          cd Mimic-Docs
          mdbook build
          
      - name: Prepare Deployment Folder
        run: |
          mkdir -p public
          cp -r Mimic-Landing/* public/
          rm -rf public/docs
          cp -r Mimic-Docs/book public/docs
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
