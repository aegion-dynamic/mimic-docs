name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push a branch 
      pull-requests: write  # To create a PR from that branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: (test -x $HOME/.cargo/bin/mdbook || cargo install --vers "^0.4" mdbook)
      - run: |
          cd Mimic-Docs
          mdbook build && mdbook test
          cd ..
          mkdir -p public/data
          
          # Securely fetch contributor data using the secret
          for repo in Mimic-Firmware Mimic-Bridge Mimic-Sensors; do
            curl -H "Authorization: Bearer ${{ secrets.GIT_PAT_MIMIC }}" \
                 "https://api.github.com/repos/aegion-dynamic/$repo/contributors?anon=1" \
                 > "public/data/contributors_$repo.json"
          done
          
          cp -r Mimic-Landing/* public/
          rm -rf public/docs
          cp -r Mimic-Docs/book public/docs
          echo "mimic.aegiondynamic.com" > public/CNAME
          touch public/.nojekyll
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: public # The folder the action should deploy.
